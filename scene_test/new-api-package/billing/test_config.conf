# 计费准确性测试配置文件
#
# 本文件定义测试用例的关键配置参数
# 修改后重新运行测试即可应用新配置

# ============================================
# 计费公式参数配置
# ============================================

# 分组倍率（GroupRatio）
GROUP_RATIO_DEFAULT=1.0
GROUP_RATIO_VIP=2.0
GROUP_RATIO_SVIP=0.8

# 模型倍率（ModelRatio）
MODEL_RATIO_GPT4=2.0
MODEL_RATIO_GPT35=1.0
MODEL_RATIO_CLAUDE_OPUS=2.5
MODEL_RATIO_CLAUDE_SONNET=1.5

# 补全倍率（CompletionRatio）
COMPLETION_RATIO_DEFAULT=1.0
COMPLETION_RATIO_CLAUDE=1.2

# 缓存Token倍率
CACHED_TOKEN_RATIO=0.1

# ============================================
# 测试套餐配置
# ============================================

# 月度限额（quota）
TEST_PACKAGE_QUOTA=500000000  # 500M

# 小时限额（hourly_limit）
TEST_PACKAGE_HOURLY_SMALL=5000000   # 5M（用于测试超限）
TEST_PACKAGE_HOURLY_MEDIUM=20000000 # 20M（正常场景）
TEST_PACKAGE_HOURLY_LARGE=50000000  # 50M（大限额）

# 日限额（daily_limit）
TEST_PACKAGE_DAILY=150000000  # 150M

# 周限额（weekly_limit）
TEST_PACKAGE_WEEKLY=500000000  # 500M

# RPM限制（rpm_limit）
TEST_PACKAGE_RPM=60

# 优先级（priority）
PRIORITY_HIGH=15
PRIORITY_P2P=11
PRIORITY_LOW=5

# ============================================
# 测试用户配置
# ============================================

# 用户初始余额
TEST_USER_QUOTA_DEFAULT=100000000  # 100M
TEST_USER_QUOTA_SMALL=10000000     # 10M（用于测试余额不足）
TEST_USER_QUOTA_LARGE=500000000    # 500M（大余额）

# ============================================
# Mock LLM响应配置
# ============================================

# 标准响应的token数量
MOCK_RESPONSE_SMALL_INPUT=100
MOCK_RESPONSE_SMALL_OUTPUT=50

MOCK_RESPONSE_MEDIUM_INPUT=1000
MOCK_RESPONSE_MEDIUM_OUTPUT=500

MOCK_RESPONSE_LARGE_INPUT=10000
MOCK_RESPONSE_LARGE_OUTPUT=5000

# ============================================
# 测试执行配置
# ============================================

# 异步更新等待时间（毫秒）
ASYNC_UPDATE_WAIT_MS=500

# 请求间隔时间（毫秒）
REQUEST_INTERVAL_MS=200

# 超时配置（秒）
TEST_TIMEOUT_SECONDS=30

# ============================================
# 容错配置
# ============================================

# 允许的计算误差范围（quota单位）
QUOTA_TOLERANCE=100

# 允许的百分比误差
PERCENTAGE_TOLERANCE=0.01  # 1%

# ============================================
# 注意事项
# ============================================
# 1. 本配置文件为文档性质，Go测试代码中需要手动应用这些值
# 2. 修改配置后需要重新编译测试
# 3. 生产环境的配置可能不同，请勿直接使用测试配置
